# Configuração Global de Tipagem (Link com fnParseKind.m)
Config:
  Delimitador: '|'
  Encoding: 'UTF-8'
  Versao_Leiaute: '018'

Blocos:
  # --- BLOCO 0: ABERTURA, IDENTIFICAÇÃO E REFERÊNCIAS ---
  Bloco_0:
    Registros:
      - Registro: '0002'
        Descricao: 'Classificação do estabelecimento'
        Campos:
          - {
              Pos: 2,
              Tag: 'CLAS_ESTAB',
              Tipo: 'code2',
              Desc: 'Classificação do estabelecimento',
            }
        Derivados:
          - {
              Name: 'CLAS_ESTAB_DESC',
              Kind: 'text',
              Fn: "switch(CLAS_ESTAB) { '01': 'Industrial', '02': 'Atacadista', '03': 'Varejista' }",
            }

      - Registro: '0221'
        Descricao: 'Correlação de Unidades de Medida'
        Campos:
          - {
              Pos: 2,
              Tag: 'COD_ITEM_ORI',
              Tipo: 'text',
              Desc: 'Código do item original',
            }
          - {
              Pos: 3,
              Tag: 'UNID_ORI',
              Tipo: 'text',
              Desc: 'Unidade de medida original',
            }
          - {
              Pos: 4,
              Tag: 'QTD_ORI',
              Tipo: 'number',
              Desc: 'Quantidade na unidade original',
            }
          # --- REGISTRO 0300: CADASTRO DE BENS ---
      - Registro: '0300'
        Descricao: 'Identificação do Bem (Ativo Imobilizado)'
        Ativo: true
        Campos:
          - { Pos: 1, Tag: 'REG', Tipo: 'text', Desc: "Texto fixo '0300'" }
          - {
              Pos: 2,
              Tag: 'COD_IND_BEM',
              Tipo: 'code1',
              Desc: 'Indicador do bem',
            }
          - {
              Pos: 3,
              Tag: 'IDENT_MERC',
              Tipo: 'code1',
              Desc: 'Identificação da mercadoria',
            }
          - {
              Pos: 4,
              Tag: 'DESCR_ITEM',
              Tipo: 'text',
              Desc: 'Descrição do bem',
            }
          - {
              Pos: 5,
              Tag: 'COD_PRNC',
              Tipo: 'text',
              Desc: 'Código do bem principal',
            }
          - {
              Pos: 6,
              Tag: 'COD_CTA',
              Tipo: 'text',
              Desc: 'Código da conta contábil',
            }
          - { Pos: 7, Tag: 'NR_PARC', Tipo: 'int', Desc: 'Número de parcelas' }
        Derivados:
          - Name: 'Tipo_Bem_Desc'
            Kind: 'text'
            Fn: "(r) => if r[Cod. Indicador Bem] = '1' then 'Bem' else 'Componente'"
          - Name: 'Identificacao_Bem_Desc'
            Kind: 'text'
            Fn: "(r) => let v = r[Identificação Bem] in if v = '1' then 'Máquinas' else if v = '2' then 'Equipamentos' else if v = '3' then 'Ferramentas' else 'Outros'"

      # --- REGISTRO 0305: UTILIZAÇÃO DO BEM ---
      - Registro: '0305'
        Descricao: 'Informações sobre a Utilização do Bem'
        Ativo: true
        Campos:
          - { Pos: 1, Tag: 'REG', Tipo: 'text', Desc: '0305' }
          - { Pos: 2, Tag: 'COD_CCUS', Tipo: 'text', Desc: 'Centro de Custo' }
          - { Pos: 3, Tag: 'FUNC_BEM', Tipo: 'text', Desc: 'Função do bem' }
          - {
              Pos: 4,
              Tag: 'VIDA_UTIL',
              Tipo: 'int',
              Desc: 'Vida útil restante (meses)',
            }

      # --- REGISTRO 0400: NATUREZA DA OPERAÇÃO ---
      - Registro: '0400'
        Descricao: 'Tabela de Natureza da Operação/Prestação'
        Ativo: true
        Campos:
          - { Pos: 1, Tag: 'REG', Tipo: 'text', Desc: '0400' }
          - { Pos: 2, Tag: 'COD_NAT', Tipo: 'text', Desc: 'Código da natureza' }
          - {
              Pos: 3,
              Tag: 'DESCR_NAT',
              Tipo: 'text',
              Desc: 'Descrição da natureza',
            }

      # --- REGISTRO 0450: INFORMAÇÃO COMPLEMENTAR ---
      - Registro: '0450'
        Descricao: 'Tabela de Informação Complementar'
        Ativo: true
        Campos:
          - { Pos: 1, Tag: 'REG', Tipo: 'text', Desc: '0450' }
          - { Pos: 2, Tag: 'COD_INF', Tipo: 'text', Desc: 'Código da info' }
          - { Pos: 3, Tag: 'TXT', Tipo: 'text', Desc: 'Texto da informação' }

      # --- REGISTRO 0460: OBSERVAÇÕES FISCAIS ---
      - Registro: '0460'
        Descricao: 'Tabela de Observações do Lançamento Fiscal'
        Ativo: true
        Campos:
          - { Pos: 1, Tag: 'REG', Tipo: 'text', Desc: '0460' }
          - {
              Pos: 2,
              Tag: 'COD_OBS',
              Tipo: 'text',
              Desc: 'Código da observação',
            }
          - { Pos: 3, Tag: 'TXT', Tipo: 'text', Desc: 'Texto da observação' }

  # --- BLOCO C: DOCUMENTOS FISCAIS I (MERCADORIAS) ---
  Bloco_C:
    Registros:
      - Registro: 'C001'
  Descricao: 'Abertura do Bloco C'
  Ativo: true
  Campos:
    - { Pos: 2, Tag: 'IND_MOV', Tipo: 'code1', Desc: 'Indicador de movimento' }
  Derivados:
    - Name: 'IND_MOV_DESC'
      Kind: 'text'
      Fn: "(r) => if r[IND_MOV] = '0' then 'Bloco com dados informados' else 'Bloco sem dados informados'"

    - Registro: 'C101'
      Descricao: 'Informações Adicionais dos Itens (FCP e Difal)'
      Ativo: true
      Campos:
        - {
            Pos: 2,
            Tag: 'VL_FCP_UF_DEST',
            Tipo: 'number',
            Desc: 'Valor total do FCP UF Destino',
          }
        - {
            Pos: 3,
            Tag: 'VL_ICMS_UF_DEST',
            Tipo: 'number',
            Desc: 'Valor total do ICMS UF Destino',
          }
        - {
            Pos: 4,
            Tag: 'VL_ICMS_UF_REM',
            Tipo: 'number',
            Desc: 'Valor total do ICMS UF Remetente',
          }

    - Registro: 'C105'
      Descricao: 'Operações com ICMS ST Recolhido para Outra UF'
      Ativo: true
      Campos:
        - {
            Pos: 2,
            Tag: 'OPER',
            Tipo: 'code1',
            Desc: 'Indicador do tipo de operação',
          }
        - { Pos: 3, Tag: 'UF', Tipo: 'text', Desc: 'Sigla da UF' }

    - Registro: 'C110'
      Descricao: 'Informação Complementar da Nota Fiscal'
      Ativo: true
      Campos:
        - {
            Pos: 2,
            Tag: 'COD_INF',
            Tipo: 'text',
            Desc: 'Código da informação complementar',
          }
        - {
            Pos: 3,
            Tag: 'TXT_COMPL',
            Tipo: 'text',
            Desc: 'Descrição complementar',
          }

    - Registro: 'C111'
      Descricao: 'Processo Judicial ou Administrativo Referenciado'
      Ativo: true
      Campos:
        - {
            Pos: 2,
            Tag: 'NUM_PROC',
            Tipo: 'text',
            Desc: 'Identificação do processo',
          }
        - { Pos: 3, Tag: 'IND_PROC', Tipo: 'code1', Desc: 'Origem do processo' }

    - Registro: 'C112'
      Descricao: 'Documento de Arrecadação Referenciado'
      Ativo: true
      Campos:
        - {
            Pos: 2,
            Tag: 'COD_DA',
            Tipo: 'code1',
            Desc: 'Código do modelo do documento',
          }
        - { Pos: 3, Tag: 'UF', Tipo: 'text', Desc: 'UF do documento' }
        - { Pos: 4, Tag: 'NUM_DA', Tipo: 'text', Desc: 'Número do documento' }
        - {
            Pos: 5,
            Tag: 'COD_AUT',
            Tipo: 'text',
            Desc: 'Código de autenticação',
          }

    - Registro: 'C113'
      Descricao: 'Documento Fiscal Referenciado'
      Ativo: true
      Campos:
        - {
            Pos: 2,
            Tag: 'IND_OPER',
            Tipo: 'code1',
            Desc: 'Indicador do tipo de operação',
          }
        - {
            Pos: 3,
            Tag: 'IND_EMIT',
            Tipo: 'code1',
            Desc: 'Indicador do emitente',
          }
        - {
            Pos: 4,
            Tag: 'COD_PART',
            Tipo: 'text',
            Desc: 'Código do participante',
          }
        - { Pos: 5, Tag: 'COD_MOD', Tipo: 'code2', Desc: 'Código do modelo' }
        - { Pos: 6, Tag: 'SERIE', Tipo: 'text', Desc: 'Série do documento' }
        - { Pos: 7, Tag: 'NUM_DOC', Tipo: 'text', Desc: 'Número do documento' }
        - { Pos: 8, Tag: 'DT_DOC', Tipo: 'date', Desc: 'Data da emissão' }
        - {
            Pos: 9,
            Tag: 'CHV_DFE',
            Tipo: 'text',
            Desc: 'Chave do documento eletrônico',
          }
      Derivados:
        - Name: 'Tipo_Operacao_Desc'
          Kind: 'text'
          Fn: "(r) => if r[IND_OPER] = '0' then 'Entrada' else 'Saída'"

    - Registro: 'C114'
      Descricao: 'Cupom Fiscal Referenciado'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'COD_MOD', Tipo: 'code2', Desc: 'Código do modelo' }
        - {
            Pos: 3,
            Tag: 'ECF_FAB',
            Tipo: 'text',
            Desc: 'Número de série do ECF',
          }
        - { Pos: 4, Tag: 'ECF_CX', Tipo: 'text', Desc: 'Número do caixa' }
        - {
            Pos: 5,
            Tag: 'NUM_DOC',
            Tipo: 'text',
            Desc: 'Número do cupom fiscal',
          }
        - { Pos: 6, Tag: 'DT_DOC', Tipo: 'date', Desc: 'Data da emissão' }

    - Registro: 'C116'
      Descricao: 'Cupom Fiscal Eletrônico Referenciado'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'COD_MOD', Tipo: 'code2', Desc: 'Código do modelo' }
        - {
            Pos: 3,
            Tag: 'NR_SAT',
            Tipo: 'text',
            Desc: 'Número de série do SAT',
          }
        - { Pos: 4, Tag: 'CHV_CFE', Tipo: 'text', Desc: 'Chave do CFe' }
        - { Pos: 5, Tag: 'NUM_CFE', Tipo: 'text', Desc: 'Número do CFe' }
        - { Pos: 6, Tag: 'DT_DOC', Tipo: 'date', Desc: 'Data da emissão' }

    - Registro: 'C120'
      Descricao: 'Complemento de Importação'
      Ativo: true
      Campos:
        - {
            Pos: 2,
            Tag: 'COD_DOC_IMP',
            Tipo: 'code1',
            Desc: 'Documento de importação',
          }
        - {
            Pos: 3,
            Tag: 'NUM_DOC_IMP',
            Tipo: 'text',
            Desc: 'Número do documento',
          }
        - { Pos: 4, Tag: 'PIS_IMP', Tipo: 'number', Desc: 'Valor do PIS pago' }
        - {
            Pos: 5,
            Tag: 'COFINS_IMP',
            Tipo: 'number',
            Desc: 'Valor da COFINS paga',
          }
        - {
            Pos: 6,
            Tag: 'NUM_ACDRAW',
            Tipo: 'text',
            Desc: 'Número do Ato Concessório Drawback',
          }

    - Registro: 'C170'
      Descricao: 'Itens do Documento'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'NUM_ITEM', Tipo: 'int', Desc: 'Número do item' }
        - { Pos: 3, Tag: 'COD_ITEM', Tipo: 'text', Desc: 'Código do item' }
        - { Pos: 10, Tag: 'CST_ICMS', Tipo: 'code3', Desc: 'CST ICMS' }
        - { Pos: 11, Tag: 'CFOP', Tipo: 'code4', Desc: 'CFOP' }
        - {
            Pos: 38,
            Tag: 'IND_MOV',
            Tipo: 'code1',
            Desc: 'Movimentação física',
          }
      Derivados:
        - Name: 'IND_MOV_DESC'
          Kind: 'text'
          Fn: "(r) => if r[IND_MOV] = '0' then 'Sim' else 'Não'"
        - Name: 'Origem_Mercadoria'
          Kind: 'text'
          Fn: '(r) => Text.Start(r[CST_ICMS], 1)'

    - Registro: 'C176'
      Descricao: 'Ressarcimento de ICMS ST e Antecipação'
      Ativo: true
      Campos:
        - {
            Pos: 2,
            Tag: 'COD_MOD_RET',
            Tipo: 'code2',
            Desc: 'Modelo do documento',
          }
        - {
            Pos: 3,
            Tag: 'NUM_DOC_RET',
            Tipo: 'text',
            Desc: 'Número do documento',
          }
        - { Pos: 4, Tag: 'SERIE_RET', Tipo: 'text', Desc: 'Série do documento' }
        - { Pos: 5, Tag: 'DT_RET', Tipo: 'date', Desc: 'Data do documento' }
        - {
            Pos: 6,
            Tag: 'COD_PART_RET',
            Tipo: 'text',
            Desc: 'Código do participante',
          }

    - Registro: 'C177'
      Descricao: 'Operações com Produtos Sujeitos a Selo de Controle'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'COD_SELO', Tipo: 'text', Desc: 'Código do selo' }
        - {
            Pos: 3,
            Tag: 'QT_SELO',
            Tipo: 'number',
            Desc: 'Quantidade de selos',
          }

    - Registro: 'C179'
      Descricao: 'Informações Complementares de ST'
      Ativo: true
      Campos:
        - {
            Pos: 2,
            Tag: 'BC_ST_ORIG_DEST',
            Tipo: 'number',
            Desc: 'Base de cálculo ST',
          }
        - {
            Pos: 3,
            Tag: 'ICMS_ST_REP',
            Tipo: 'number',
            Desc: 'ICMS ST repassado',
          }
        - {
            Pos: 4,
            Tag: 'ICMS_ST_COMPL',
            Tipo: 'number',
            Desc: 'ICMS ST complementar',
          }
        - { Pos: 5, Tag: 'ICMS_RET', Tipo: 'number', Desc: 'ICMS retido' }

    - Registro: 'C180'
      Descricao: 'Informações Complementares das Operações de Devolução (C100)'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'COD_ITEM', Tipo: 'text', Desc: 'Código do item' }
        - { Pos: 3, Tag: 'UNID', Tipo: 'text', Desc: 'Unidade de medida' }
        - { Pos: 4, Tag: 'QTD', Tipo: 'number', Desc: 'Quantidade' }
        - { Pos: 5, Tag: 'VL_UNIT', Tipo: 'number', Desc: 'Valor unitário' }
        - { Pos: 6, Tag: 'VL_ITEM', Tipo: 'number', Desc: 'Valor total' }

    - Registro: 'C181'
      Descricao: 'Informações Complementares das Operações de Devolução de Saída'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'COD_ITEM', Tipo: 'text', Desc: 'Código do item' }
        - { Pos: 3, Tag: 'UNID', Tipo: 'text', Desc: 'Unidade' }

    - Registro: 'C185'
      Descricao: 'Informações Complementares das Operações de Saída de Mercadorias'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'NUM_ITEM', Tipo: 'int', Desc: 'Número do item' }
        - { Pos: 3, Tag: 'COD_ITEM', Tipo: 'text', Desc: 'Código do item' }

    - Registro: 'C186'
      Descricao: 'Informações Complementares das Operações de Entrada de Mercadorias'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'NUM_ITEM', Tipo: 'int', Desc: 'Número do item' }
        - { Pos: 3, Tag: 'COD_ITEM', Tipo: 'text', Desc: 'Código do item' }

    - Registro: 'C190'
      Descricao: 'Registro Analítico do Documento'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'CST_ICMS', Tipo: 'code3', Desc: 'CST do ICMS' }
        - { Pos: 3, Tag: 'CFOP', Tipo: 'code4', Desc: 'CFOP' }
        - { Pos: 4, Tag: 'ALIQ_ICMS', Tipo: 'number', Desc: 'Alíquota do ICMS' }
        - { Pos: 5, Tag: 'VL_OPR', Tipo: 'number', Desc: 'Valor da operação' }
        - { Pos: 6, Tag: 'VL_BC_ICMS', Tipo: 'number', Desc: 'Base de cálculo' }
        - { Pos: 7, Tag: 'VL_ICMS', Tipo: 'number', Desc: 'Valor do ICMS' }

    - Registro: 'C191'
      Descricao: 'Informações do FCP (C190)'
      Ativo: true
      Campos:
        - {
            Pos: 2,
            Tag: 'VL_FCP_OP',
            Tipo: 'number',
            Desc: 'Valor do FCP operação',
          }
        - { Pos: 3, Tag: 'VL_FCP_ST', Tipo: 'number', Desc: 'Valor do FCP ST' }

    - Registro: 'C195'
      Descricao: 'Observações do Lançamento Fiscal'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'COD_OBS', Tipo: 'text', Desc: 'Código da observação' }
        - { Pos: 3, Tag: 'TXT_COMPL', Tipo: 'text', Desc: 'Texto complementar' }

    - Registro: 'C197'
      Descricao: 'Ajustes e Informações de Valores Provenientes de Documento Fiscal'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'COD_AJ', Tipo: 'text', Desc: 'Código do ajuste' }
        - {
            Pos: 3,
            Tag: 'DESCR_COMPL',
            Tipo: 'text',
            Desc: 'Descrição complementar',
          }
        - { Pos: 4, Tag: 'COD_ITEM', Tipo: 'text', Desc: 'Código do item' }
        - {
            Pos: 5,
            Tag: 'VL_BC_ICMS',
            Tipo: 'number',
            Desc: 'Base de cálculo ICMS',
          }
        - { Pos: 6, Tag: 'ALIQ_ICMS', Tipo: 'number', Desc: 'Alíquota ICMS' }
        - { Pos: 7, Tag: 'VL_ICMS', Tipo: 'number', Desc: 'Valor ICMS' }
        - { Pos: 8, Tag: 'VL_OUTROS', Tipo: 'number', Desc: 'Outros valores' }
    - Registro: 'C300'
      Descricao: 'Resumo Diário das Notas Fiscais de Venda a Consumidor (Modelo 02)'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'COD_MOD', Tipo: 'code2', Desc: 'Código do modelo do documento fiscal' }
        - { Pos: 3, Tag: 'SERIE', Tipo: 'text', Desc: 'Série do documento fiscal' }
        - { Pos: 4, Tag: 'SUB', Tipo: 'text', Desc: 'Subsérie do documento fiscal' }
        - { Pos: 5, Tag: 'NUM_DOC_INI', Tipo: 'int', Desc: 'Número do documento inicial' }
        - { Pos: 6, Tag: 'NUM_DOC_FIN', Tipo: 'int', Desc: 'Número do documento final' }
        - { Pos: 7, Tag: 'DT_DOC', Tipo: 'date', Desc: 'Data da emissão dos documentos fiscais' }
        - { Pos: 8, Tag: 'VL_DOC', Tipo: 'number', Desc: 'Valor total dos documentos' }
        - { Pos: 9, Tag: 'VL_PIS', Tipo: 'number', Desc: 'Valor total do PIS' }
        - { Pos: 10, Tag: 'VL_COFINS', Tipo: 'number', Desc: 'Valor total da COFINS' }
      Derivados:
        - Name: 'Modelo_Desc'
          Kind: 'text'
          Fn: "(r) => if r[COD_MOD] = '02' then 'Nota Fiscal de Venda a Consumidor' else 'Outros'"

    - Registro: 'C310'
      Descricao: 'Documentos Cancelados de Notas Fiscais de Venda a Consumidor (Modelo 02)'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'NUM_DOC_CANC', Tipo: 'int', Desc: 'Número do documento fiscal cancelado' }

    - Registro: 'C320'
      Descricao: 'Registro Analítico do Resumo Diário (Modelo 02)'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'CST_ICMS', Tipo: 'code3', Desc: 'CST do ICMS' }
        - { Pos: 3, Tag: 'CFOP', Tipo: 'code4', Desc: 'CFOP' }
        - { Pos: 4, Tag: 'ALIQ_ICMS', Tipo: 'number', Desc: 'Alíquota do ICMS' }
        - { Pos: 5, Tag: 'VL_OPR', Tipo: 'number', Desc: 'Valor total da operação' }
        - { Pos: 6, Tag: 'VL_BC_ICMS', Tipo: 'number', Desc: 'Base de cálculo do ICMS' }
        - { Pos: 7, Tag: 'VL_ICMS', Tipo: 'number', Desc: 'Valor do ICMS creditado/debitado' }
        - { Pos: 8, Tag: 'VL_RED_BC', Tipo: 'number', Desc: 'Valor da redução da base de cálculo' }
        - { Pos: 9, Tag: 'COD_OBS', Tipo: 'text', Desc: 'Código da observação (0460)' }

    - Registro: 'C321'
      Descricao: 'Itens do Resumo Diário (Modelo 02)'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'COD_ITEM', Tipo: 'text', Desc: 'Código do item (0200)' }
        - { Pos: 3, Tag: 'QTD', Tipo: 'number', Desc: 'Quantidade acumulada do item' }
        - { Pos: 4, Tag: 'UNID', Tipo: 'text', Desc: 'Unidade de medida' }
        - { Pos: 5, Tag: 'VL_ITEM', Tipo: 'number', Desc: 'Valor acumulado do item' }
        - { Pos: 6, Tag: 'VL_DESC', Tipo: 'number', Desc: 'Valor acumulado dos descontos' }
        - { Pos: 7, Tag: 'VL_BC_ICMS', Tipo: 'number', Desc: 'Base de cálculo do ICMS' }
        - { Pos: 8, Tag: 'VL_ICMS', Tipo: 'number', Desc: 'Valor do ICMS acumulado' }
        - { Pos: 9, Tag: 'VL_PIS', Tipo: 'number', Desc: 'Valor do PIS acumulado' }
        - { Pos: 10, Tag: 'VL_COFINS', Tipo: 'number', Desc: 'Valor da COFINS acumulado' }

    - Registro: 'C330'
      Descricao: 'Informações Complementares (Modelo 02)'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'COD_MOT_REST_COMPL', Tipo: 'code1', Desc: 'Motivo da restituição ou complementação' }
        - { Pos: 3, Tag: 'VL_REST_ICMS_MOT', Tipo: 'number', Desc: 'Valor do ICMS a ser restituído' }
        - { Pos: 4, Tag: 'VL_COMPL_ICMS_MOT', Tipo: 'number', Desc: 'Valor do ICMS a ser complementado' }

    - Registro: 'C350'
      Descricao: 'Nota Fiscal de Venda a Consumidor (Modelo 02)'
      Ativo: true
      Campos:
        - { Pos: 2, Tag: 'SERIE', Tipo: 'text', Desc: 'Série do documento fiscal' }
        - { Pos: 3, Tag: 'SUB', Tipo: 'text', Desc: 'Subsérie do documento fiscal' }
        - { Pos: 4, Tag: 'NUM_DOC', Tipo: 'int', Desc: 'Número do documento fiscal' }
        - { Pos: 5, Tag: 'DT_DOC', Tipo: 'date', Desc: 'Data da emissão' }
        - { Pos: 6, Tag: 'CNPJ_CPF', Tipo: 'text', Desc: 'CNPJ ou CPF do destinatário' }
        - { Pos: 7, Tag: 'VL_DOC', Tipo: 'number', Desc: 'Valor total do documento' }
        - { Pos: 8, Tag: 'VL_DESC', Tipo: 'number', Desc: 'Valor total do desconto' }
        - { Pos: 9, Tag: 'VL_PIS', Tipo: 'number', Desc: 'Valor do PIS' }
